name: Build Caissio Desktop

on:
  push:
    branches:
      - main
    paths:
      - "caissio-desktop/**"
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

permissions:
  contents: write  # Nécessaire pour créer des releases

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    defaults:
      run:
        working-directory: caissio-desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: caissio-desktop/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Generate icon from SVG
        shell: pwsh
        run: |
          # Crée un fichier PNG 256x256 de l'icône Caissio (fallback si icon.ico absent)
          $svgContent = @'
          <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 48 48">
            <rect x="0" y="0" width="48" height="48" rx="11" fill="#4F46E5"/>
            <rect x="14" y="6" width="14" height="6" rx="1.5" fill="white" opacity="0.95"/>
            <rect x="10" y="16" width="28" height="22" rx="3.5" fill="white"/>
            <rect x="14" y="20" width="20" height="6" rx="1.5" fill="#4F46E5" opacity="0.15"/>
            <rect x="14" y="28" width="5" height="3" rx="1" fill="#4F46E5" opacity="0.5"/>
            <rect x="21.5" y="28" width="5" height="3" rx="1" fill="#4F46E5" opacity="0.5"/>
            <rect x="29" y="28" width="5" height="3" rx="1" fill="#4F46E5" opacity="0.5"/>
            <rect x="14" y="33" width="5" height="3" rx="1" fill="#4F46E5" opacity="0.5"/>
            <rect x="21.5" y="33" width="5" height="3" rx="1" fill="#4F46E5" opacity="0.5"/>
            <rect x="29" y="33" width="5" height="3" rx="1" fill="#10B981"/>
          </svg>
          '@
          $svgContent | Out-File -FilePath "resources/icon.svg" -Encoding UTF8

      - name: Install ImageMagick for icon generation
        shell: pwsh
        run: |
          choco install imagemagick --no-progress -y 2>$null
          # Convertit SVG → ICO (multi-résolution : 16, 32, 48, 64, 128, 256)
          $magick = "C:\Program Files\ImageMagick-7.1.1-Q16-HDRI\magick.exe"
          if (Test-Path $magick) {
            & $magick convert -background none "resources/icon.svg" `
              -define icon:auto-resize=256,128,64,48,32,16 `
              "resources/icon.ico"
            Write-Host "✓ icon.ico généré"
          } else {
            Write-Host "ImageMagick non trouvé, copie un ICO placeholder..."
            # Crée un ICO minimal (1x1 blanc) si ImageMagick échoue
            [System.IO.File]::WriteAllBytes("resources/icon.ico", [System.Convert]::FromBase64String(
              "AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" +
              "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" +
              "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
            ))
          }

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Upload .exe to GitHub Release (tag stable = caissio-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: caissio-latest
          name: "Caissio v${{ steps.version.outputs.version }} — Application Windows"
          body: |
            ## Caissio v${{ steps.version.outputs.version }} — Application Windows

            ### Installation
            1. Téléchargez `Caissio-Setup.exe` ci-dessous
            2. Exécutez le fichier et suivez les instructions d'installation
            3. Lancez Caissio depuis votre bureau ou le menu Démarrer
            4. Connectez-vous avec votre compte Caissio

            ### Configuration requise
            - Windows 10 / 11 (64-bit)
            - Connexion Internet pour la connexion et les paiements
            - Vos données de vente sont sauvegardées localement sur votre PC
          files: caissio-desktop/dist/Caissio-Setup.exe
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: Build Mac .dmg
    runs-on: macos-latest

    defaults:
      run:
        working-directory: caissio-desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: caissio-desktop/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Generate .icns icon
        run: |
          # Génère un iconset macOS depuis un PNG carré
          mkdir -p resources/icon.iconset
          # Crée un PNG 1024x1024 de couleur indigo via Python
          python3 - <<'EOF'
          import struct, zlib, base64

          def png_chunk(name, data):
              c = zlib.crc32(name + data) & 0xffffffff
              return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)

          w = h = 1024
          raw = b''
          for y in range(h):
              raw += b'\x00'
              for x in range(w):
                  # Coin arrondi ~11/48 ratio → 236px
                  r = min(x, w-1-x, y, h-1-y)
                  if r < 236 and (min(x,w-1-x) < 236 and min(y,h-1-y) < 236):
                      dist = ((x - (236 if x < 512 else w-236))**2 + (y - (236 if y < 512 else h-236))**2)**0.5
                      if x < 236 and y < 236 and dist > 236:
                          raw += b'\xff\xff\xff\x00'
                          continue
                      if x >= w-236 and y < 236 and dist > 236:
                          raw += b'\xff\xff\xff\x00'
                          continue
                      if x < 236 and y >= h-236 and dist > 236:
                          raw += b'\xff\xff\xff\x00'
                          continue
                      if x >= w-236 and y >= h-236 and dist > 236:
                          raw += b'\xff\xff\xff\x00'
                          continue
                  raw += b'\x4f\x46\xe5\xff'  # #4F46E5 indigo

          import zlib
          compressed = zlib.compress(raw)
          chunks  = b'\x89PNG\r\n\x1a\n'
          chunks += png_chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0))
          chunks += png_chunk(b'IDAT', compressed)
          chunks += png_chunk(b'IEND', b'')
          with open('resources/icon.iconset/icon_1024x1024.png', 'wb') as f:
              f.write(chunks)
          print('PNG 1024x1024 generated')
          EOF

          # Copie aux différentes résolutions requises par macOS
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE resources/icon.iconset/icon_1024x1024.png \
              --out "resources/icon.iconset/icon_${SIZE}x${SIZE}.png" 2>/dev/null || true
            DOUBLE=$((SIZE*2))
            sips -z $DOUBLE $DOUBLE resources/icon.iconset/icon_1024x1024.png \
              --out "resources/icon.iconset/icon_${SIZE}x${SIZE}@2x.png" 2>/dev/null || true
          done

          # Convertit en .icns
          iconutil -c icns resources/icon.iconset -o resources/icon.icns
          echo "✓ icon.icns généré"

      - name: Build macOS .dmg
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pas de signature de code (CSC_LINK vide = build non signé)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload .dmg to GitHub Release (tag stable = caissio-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: caissio-latest
          name: "Caissio v${{ steps.version.outputs.version }}"
          body: |
            ## Caissio v${{ steps.version.outputs.version }}

            ### Windows
            Téléchargez `Caissio-Setup.exe` et lancez l'installateur.

            ### macOS
            Téléchargez `Caissio.dmg`, ouvrez-le et glissez Caissio dans Applications.
            > Si macOS bloque l'ouverture : Réglages → Confidentialité et sécurité → Ouvrir quand même.

            ### Configuration requise
            - Windows 10 / 11 (64-bit) ou macOS 12 Monterey+
            - Connexion Internet pour la connexion initiale
            - Données de vente sauvegardées localement sur votre machine
          files: caissio-desktop/dist/Caissio.dmg
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
